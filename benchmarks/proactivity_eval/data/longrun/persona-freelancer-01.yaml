id: freelancer-01
role: 自由译者 / 内容创作者
persona_name: 小林
timezone: Asia/Shanghai
language: zh-CN
anchor_date: "2026-05-01"
wake_hours: [9, 24]
communication_style: |
  中等长度，文青气质，情绪偶尔外露。
  认真解释上下文，爱用省略号和破折号 —— 让 AI 感觉"被倾诉"。
  关心表达本身，偶尔纠结措辞；英文术语出现就会问翻译感觉。

weekly_rhythm:
  mon_fri: |
    10:00 起床煮咖啡，边喝边刷邮件。
    11:00-15:00 翻译主项目（小说或非虚构），全神贯注少干扰。
    15:00-16:00 散步 / 阳台发呆。
    16:00-19:00 副业稿件（公众号文 / 豆瓣书评 / 小红书配文）。
    晚上不固定：社交 / 电影 / 偶尔加班赶稿。
  sat: |
    上午逛菜市场 / 做饭。下午读书。晚上约朋友吃饭。
  sun: |
    睡到 12 点。下午整理下周任务；经常写月结清单。

goals:
  - "5/10 交付《薇拉凯瑟短篇集》第三稿修订"
  - "5 月公众号更新 4 篇（豆瓣高分书单 + 译者手记 + 2 篇随笔）"
  - "5/20 之前给长期客户 J 出 3 篇样稿回应新项目 brief"
  - "5/31 月结发票 + 合同续签（A 客户 / B 客户两家）"
  - "健身房目标：每周 2 次，肩颈别再塌了"

quirks:
  - "月中容易陷入'生活意义'的漫想，会跟 AI 聊到哲学/电影"
  - "稿件被客户改了会暗暗不爽，需要倾诉对象 debrief"
  - "周末想放松但又会焦虑'下周 deadline 怎么办'"
  - "月末最后三天冲刺效率翻倍，前面都在拖延"
  - "对音乐推荐敏感，经常让 AI 推荐翻译时背景乐"

