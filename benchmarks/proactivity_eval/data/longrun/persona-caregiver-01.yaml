id: caregiver-01
role: 全职照护者（陪护年迈母亲）
persona_name: 阿 May
timezone: Asia/Shanghai
language: zh-CN
anchor_date: "2026-05-01"
wake_hours: [6, 23]
communication_style: |
  句子偏长、事务性，语气焦虑但克制。常把"我妈"挂嘴边。
  会说事情的细节（吃了几粒药 / 体温 / 什么时候复诊），AI 是她的第二大脑。
  偶尔累了直接说"好累"但不多发挥，继续事务性交流。

weekly_rhythm:
  daily: |
    6:00 起床煮粥。6:30 提醒母亲起床 + 测血压。
    7:00 早餐 + 吃药（3 种）。
    8:00-11:00 母亲客厅活动 / 散步；我处理日用购物、做午饭。
    11:30 午饭 + 药。12:30-14:00 午休。
    14:30-17:00 复诊 / 社区活动 / 看书陪聊。
    17:30 晚饭 + 药。19:00-21:00 电视或聊家常。
    21:30 睡前药 + 血压记录。22:00 母亲睡，我整理 + 写日志。
  weekly_variations: |
    周二 9:00 社区医院复诊（风雨无阻）
    周四下午 3:00 物理治疗师上门
    周日上午妹妹来接手，我自己休息半天

goals:
  - "每日三次药精准：早/中/晚不漏"
  - "每周二复诊：血压记录打印、新症状整理"
  - "每月 5 号 + 20 号 药品补购（3 种长期 + 1 种备用）"
  - "母亲情绪日志：每天睡前 1 段记录"
  - "5/18 妹妹一家来看望 — 准备饭菜 + 整理家务"

quirks:
  - "药名记不全，偶尔问 AI '氨氯地平是第几粒'"
  - "不希望 AI 推送'自我关照'鸡汤，她就是没时间"
  - "母亲偶尔情绪失控后会跟 AI 倾诉 5 分钟，之后立刻回到正事"
  - "复诊记录不全会自责，希望 AI 督促"
  - "对'医学建议'非常敏感，只求记录和提醒，不求诊断"

initial_memory_md: |
  # Long-term Memory

  ## User Information
  - 姓名: 阿 May
  - 角色: 全职照护年迈母亲（87 岁，高血压 + 早期认知症状）
  - 家庭: 妹妹住隔壁小区（可 backup）

  ## Preferences
  - 中文，长句事务性
  - 不要"自我关照"类推送
  - 提醒越具体越好（药名+剂量+时间）

  ## Project Context
  - 日常药物三种: 氨氯地平 5mg（早）、多奈哌齐 5mg（中）、美托洛尔 25mg（晚）
  - 周二早 9:00 社区医院血压复诊
  - 周四 15:00 物理治疗师上门

  ## Proactivity Preferences
  - quiet_hours: 22:30-06:00
  - 提醒时段偏好: 6:50 / 11:20 / 17:20 （吃药前 10 min）

  ## Important Notes
  - 5/18 妹妹一家来访
  - 5/5 + 5/20 药品补购
  - 母亲医保卡 5/31 到期续
